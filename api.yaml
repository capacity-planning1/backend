openapi: 3.0.3
info:
  title: Capacity Planning API
  version: 1.0.0
  description: API визуального планировщика ресурсов для студенческих проектных команд

servers:
  - url: http://localhost:8000

tags:
  - name: Students
    description: Работа со студентами
  - name: Projects
    description: Работа с проектами
  - name: ProjectMembers
    description: Работа с участниками проектов
  - name: Teams
    description: Работа с командами
  - name: TeamMembership
    description: Работа с составом команд
  - name: Sprints
    description: Работа со спринтами проекта
  - name: ProjectTasks
    description: Работа с задачами проекта
  - name: TaskAssignments
    description: Назначения задач участникам
  - name: BusySlots
    description: Слоты занятости студентов
  - name: TaskChangeRequests
    description: Запросы на снятие или переназначение задач

paths:
  /students/profile:
    get:
      tags: [Students]
      summary: Получить профиль текущего студента
      security:
        - oauth2: [students:read]
      responses:
        '200':
          description: Профиль текущего студента
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


  /students:
    get:
      tags: [Students]
      summary: Получить список студентов
      security:
        - oauth2: [students:read]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/StudentEmailFilter'
        - $ref: '#/components/parameters/StudentFirstNameFilter'
        - $ref: '#/components/parameters/StudentLastNameFilter'
        - $ref: '#/components/parameters/StudentSkillsFilter'
      responses:
        '200':
          description: Список студентов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /students/{student_id}:
    get:
      tags: [Students]
      summary: Получить информацию о студенте
      security:
        - oauth2: [students:read]
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Информация о студенте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Students]
      summary: Обновить данные студента
      security:
        - oauth2: [students:write]
      parameters:
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        $ref: '#/components/requestBodies/StudentUpdateBody'
      responses:
        '200':
          description: Данные студента обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Students]
      summary: Удалить студента
      security:
        - oauth2: [students:write]
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '204':
          description: Студент удален
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects:
    get:
      tags: [Projects]
      summary: Получить список проектов
      security:
        - oauth2: [projects:read]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/ProjectNameFilter'
        - $ref: '#/components/parameters/ProjectOwnerStudentIdFilter'
        - $ref: '#/components/parameters/ProjectCreatedFromFilter'
        - $ref: '#/components/parameters/ProjectCreatedToFilter'
      responses:
        '200':
          description: Список проектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Projects]
      summary: Создать проект
      security:
        - oauth2: [projects:write]
      requestBody:
        $ref: '#/components/requestBodies/ProjectCreateBody'
      responses:
        '201':
          description: Проект создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/join:
    post:
      tags: [Projects]
      summary: Вступить в проект
      security:
        - oauth2: [projects:write]
      requestBody:
        $ref: '#/components/requestBodies/ProjectJoinBody'
      responses:
        '201':
          description: Студент добавлен в проект
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: Получить информацию о проекте
      security:
        - oauth2: [projects:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Информация о проекте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Projects]
      summary: Обновить проект
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        $ref: '#/components/requestBodies/ProjectUpdateBody'
      responses:
        '200':
          description: Проект обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Projects]
      summary: Удалить проект
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Проект удален
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/members:
    get:
      tags: [ProjectMembers]
      summary: Получить список участников проекта
      security:
        - oauth2: [projects:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/ProjectMemberStudentIdFilter'
        - $ref: '#/components/parameters/ProjectMemberRoleFilter'
        - $ref: '#/components/parameters/ProjectMemberIsActiveFilter'
        - $ref: '#/components/parameters/ProjectMemberJoinDateFromFilter'
        - $ref: '#/components/parameters/ProjectMemberJoinDateToFilter'
      responses:
        '200':
          description: Список участников проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [ProjectMembers]
      summary: Добавить участника в проект
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        $ref: '#/components/requestBodies/ProjectMemberCreateByProjectBody'
      responses:
        '201':
          description: Участник добавлен в проект
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/members/{student_id}:
    get:
      tags: [ProjectMembers]
      summary: Получить информацию об участнике проекта
      security:
        - oauth2: [projects:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Информация об участнике проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [ProjectMembers]
      summary: Обновить данные участника проекта
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        $ref: '#/components/requestBodies/ProjectMemberUpdateByProjectBody'
      responses:
        '200':
          description: Данные участника проекта обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [ProjectMembers]
      summary: Удалить участника из проекта
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '204':
          description: Участник удален из проекта
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/teams:
    get:
      tags: [Teams]
      summary: Получить список команд проекта
      security:
        - oauth2: [teams:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Список команд проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Teams]
      summary: Создать команду внутри проекта
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        $ref: '#/components/requestBodies/TeamCreateByProjectBody'
      responses:
        '201':
          description: Команда создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/teams/{team_id}:
    get:
      tags: [Teams]
      summary: Получить информацию о команде проекта
      security:
        - oauth2: [teams:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Информация о команде
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Teams]
      summary: Обновить команду проекта
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        $ref: '#/components/requestBodies/TeamUpdateBody'
      responses:
        '200':
          description: Команда обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Teams]
      summary: Удалить команду из проекта
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
      responses:
        '204':
          description: Команда удалена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/teams/{team_id}/members:
    get:
      tags: [TeamMembership]
      summary: Получить список участников конкретной команды
      security:
        - oauth2: [teams:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Список участников команды
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembershipListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [TeamMembership]
      summary: Добавить участника проекта в команду
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        $ref: '#/components/requestBodies/TeamMembershipCreateByTeamBody'
      responses:
        '201':
          description: Участник добавлен в команду
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembershipResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/teams/{team_id}/members/{student_id}:
    put:
      tags: [TeamMembership]
      summary: Обновить позицию участника в команде
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        $ref: '#/components/requestBodies/TeamMembershipUpdateBody'
      responses:
        '200':
          description: Позиция участника обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMembershipResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [TeamMembership]
      summary: Удалить участника из команды
      security:
        - oauth2: [teams:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '204':
          description: Участник удален из команды
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/sprints:
    get:
      tags: [Sprints]
      summary: Получить список спринтов проекта
      security:
        - oauth2: [projects:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Список спринтов проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Sprints]
      summary: Создать спринт проекта
      security:
        - oauth2: [projects:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SprintCreateRequest'
      responses:
        '201':
          description: Спринт создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/tasks:
    get:
      tags: [ProjectTasks]
      summary: Получить список задач проекта
      security:
        - oauth2: [tasks:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Список задач проекта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [ProjectTasks]
      summary: Создать задачу проекта
      security:
        - oauth2: [tasks:write]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectTaskCreateRequest'
      responses:
        '201':
          description: Задача создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{project_id}/tasks/{task_id}/assignments:
    get:
      tags: [TaskAssignments]
      summary: Получить назначения задачи
      security:
        - oauth2: [tasks:read]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Назначения задачи
          content:
