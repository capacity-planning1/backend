components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        password:
          tokenUrl: /auth/token
          scopes:
            students:read: ""
            students:write: ""
            projects:read: ""
            projects:write: ""
            teams:read: ""
            teams:write: ""
            tasks:read: ""
            tasks:write: ""
            busy_slots:read: ""
            busy_slots:write: ""
            change_requests:read: ""
            change_requests:write: ""

  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Номер страницы
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSize:
      name: page_size
      in: query
      required: false
      description: Количество элементов на странице
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    StudentId:
      name: student_id
      in: path
      required: true
      description: ID студента
      schema:
        type: integer
        minimum: 1

    ProjectId:
      name: project_id
      in: path
      required: true
      description: ID проекта
      schema:
        type: integer
        minimum: 1

    TeamId:
      name: team_id
      in: path
      required: true
      description: ID команды
      schema:
        type: integer
        minimum: 1

    TaskId:
      name: task_id
      in: path
      required: true
      description: ID задачи
      schema:
        type: integer
        minimum: 1

    StudentEmailFilter:
      name: email
      in: query
      required: false
      description: Фильтр по email
      schema:
        type: string
        format: email

    StudentFirstNameFilter:
      name: first_name
      in: query
      required: false
      description: Фильтр по имени
      schema:
        type: string

    StudentLastNameFilter:
      name: last_name
      in: query
      required: false
      description: Фильтр по фамилии
      schema:
        type: string

    StudentSkillsFilter:
      name: skills
      in: query
      required: false
      description: Фильтр по навыкам
      schema:
        type: string

    ProjectNameFilter:
      name: name
      in: query
      required: false
      description: Фильтр по названию проекта
      schema:
        type: string

    ProjectOwnerStudentIdFilter:
      name: owner_student_id
      in: query
      required: false
      description: Фильтр по ID владельца проекта
      schema:
        type: integer
        minimum: 1

    ProjectCreatedFromFilter:
      name: created_from
      in: query
      required: false
      description: Нижняя граница даты создания проекта
      schema:
        type: string
        format: date-time

    ProjectCreatedToFilter:
      name: created_to
      in: query
      required: false
      description: Верхняя граница даты создания проекта
      schema:
        type: string
        format: date-time

    ProjectMemberStudentIdFilter:
      name: student_id
      in: query
      required: false
      description: Фильтр по ID студента
      schema:
        type: integer
        minimum: 1

    ProjectMemberRoleFilter:
      name: role
      in: query
      required: false
      description: Фильтр по роли участника проекта
      schema:
        type: string

    ProjectMemberIsActiveFilter:
      name: is_active
      in: query
      required: false
      description: Фильтр по активности участника проекта
      schema:
        type: boolean

    ProjectMemberJoinDateFromFilter:
      name: join_date_from
      in: query
      required: false
      description: Нижняя граница даты вступления в проект
      schema:
        type: string
        format: date

    ProjectMemberJoinDateToFilter:
      name: join_date_to
      in: query
      required: false
      description: Верхняя граница даты вступления в проект
      schema:
        type: string
        format: date

    SprintId:
      name: sprint_id
      in: path
      required: true
      description: ID спринта
      schema:
        type: integer
        minimum: 1

    ProjectMemberId:
      name: project_member_id
      in: path
      required: true
      description: ID участника проекта
      schema:
        type: integer
        minimum: 1

    BusySlotId:
      name: busy_slot_id
      in: path
      required: true
      description: ID слота занятости
      schema:
        type: integer
        minimum: 1

    RequestId:
      name: request_id
      in: path
      required: true
      description: ID запроса на изменение задачи
      schema:
        type: integer
        minimum: 1

  requestBodies:
    StudentUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudentUpdateRequest'

    ProjectCreateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectCreateRequest'

    ProjectUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectUpdateRequest'

    ProjectJoinBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectJoinRequest'

    ProjectMemberCreateByProjectBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectMemberCreateByProjectRequest'

    ProjectMemberUpdateByProjectBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProjectMemberUpdateRequest'

    TeamCreateByProjectBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamCreateByProjectRequest'

    TeamUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamUpdateRequest'

    TeamMembershipCreateByTeamBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamMembershipCreateByTeamRequest'

    TeamMembershipUpdateBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamMembershipUpdateRequest'

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestErrorResponse'

    Unauthorized:
      description: Требуется авторизация
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedErrorResponse'

    Forbidden:
      description: Отсутствуют права доступа для выполнения запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenErrorResponse'

    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundErrorResponse'

    Conflict:
      description: Конфликт данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictErrorResponse'

    ValidationError:
      description: Ошибка валидации входных данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    InternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerErrorResponse'


  schemas:
    TaskStatus:
      type: string
      description: Статус задачи
      enum:
